<article class="post">
  <div layout="row">
    <div class="post-date">
      <time>{{ post.date | date: "%b %-d, %Y" }}</time>
    </div>

    <div class="post-content-divider"></div>

    <div class="post-summary">
      <md-tooltip md-direction="top">{{post.category}} by {{post.author}}</md-tooltip>
      <a href="{{ post.url | prepend: site.baseurl }}">
        <header class="post-header">
          <h1 class="post-title">
            {{ post.title }}
          </h1>
        </header>

        <p>
          <span class="strong">Tags</span>: {{post.tags}}
        </p>

        <p>
          {{ post.content | strip_html | truncatewords: 20 }}
        </p>
      </a>
    </div>
  </div>
</article>
